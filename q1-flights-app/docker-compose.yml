services:
  db:
    image: postgres:16
    container_name: flights_db
    environment:
      POSTGRES_USER: flights_user
      POSTGRES_PASSWORD: flights_pass
      POSTGRES_DB: flights_db
    ports:
      - "5434:5432"
    volumes:
      - ../flights.sql:/docker-entrypoint-initdb.d/flights.sql
      - flights_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flights_user -d flights_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  flights_pgdata:
